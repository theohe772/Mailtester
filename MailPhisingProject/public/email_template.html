<span><strong>From:</strong> {{ sender_name }} &lt;{{ sender_email }}&gt;</span>
<span><strong>To:</strong> {{ recipient_email }}</span>
<span><strong>date:</strong> {{ date }}</span>
<span><strong>Subject:</strong> {{ subject }}</span>

<p>{{ body_text }}</p>

</a>

<p>{{ closing_text }}</p>
